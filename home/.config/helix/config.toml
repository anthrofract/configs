theme = "bamboo"

[editor]
color-modes = true
end-of-line-diagnostics = "disable"
idle-timeout = 10
line-number = "absolute"
scrolloff = 10
shell = ["nu", "--commands"]
text-width = 100
trim-final-newlines = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.inline-diagnostics]
cursor-line = "hint"

[editor.lsp]
display-progress-messages = true

[editor.soft-wrap]
enable = true

[editor.statusline]
left = ["mode", "spinner", "file-type", "file-name", "spacer", "read-only-indicator", "file-modification-indicator"]
right = ["diagnostics", "selections", "register", "spacer", "version-control", "spacer", "spacer", "position-percentage", "spacer", "position", "file-encoding"]
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

[keys.normal]
"\\" = "toggle_comments"
- = "file_explorer_in_current_buffer_directory"
A-S = ":w"
B = "move_prev_sub_word_start"
E = "move_next_sub_word_end"
W = "move_next_sub_word_start"
X = "select_line_above"
Z.Z = ":wq"
backspace = [":reload-all", ":write-all"]
esc = ["collapse_selection", "keep_primary_selection"]
ret = "goto_line"

[keys.normal.space]
L = ':sh gh browse "%{buffer_name}:%{selection_line_start}-%{selection_line_end}" --commit o+e> /dev/null'
Q = ":qa!"
X = [":reload-all", ":lsp-restart"]
l = ':sh printf "@%%s L%%s-L%%s" "%{buffer_name}" "%{selection_line_start}" "%{selection_line_end}" | c'
q = ":qa"
x = [":reload-all", ":write-all"]
space = "file_picker"

[keys.select]
B = "extend_prev_sub_word_start"
E = "extend_next_sub_word_end"
W = "extend_next_sub_word_start"
