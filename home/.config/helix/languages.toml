[[language]]
name = "nix"
formatter = { command = "nixfmt" }
auto-format = true
language-servers = ["nixd"]

[[language]]
name = "jsonc"
file-types = ["jsonc", "json"]
formatter = { command = "prettier", args = ["--parser", "json"] }

[[language]]
name = "typescript"
auto-format = true
formatter = { command = 'prettier', args = ["--parser", "typescript"] }

[[language]]
name = "python"
formatter = { command = "black", args = ["--quiet", "-"] }
auto-format = true

[[language]]
name = "jjdescription"
rulers = []
grammar = ""

[[language]]
name = "move"
roots = ["Move.toml", ".git"]
language-servers = ["move-analyzer"]
formatter = { command = "prettier-move", args = ["--parser", "move", "--use-tabs", "false", "--tab-width", "4"] }
auto-format = true

[language-server.move-analyzer]
command = "move-analyzer"

[language-server.rust-analyzer.config]
cargo.features = "all"
check.command = "clippy"
files.watcher = "server"
